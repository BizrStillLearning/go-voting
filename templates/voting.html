<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Poll.Title }} - GoVoting</title>
    <link rel="stylesheet" href="/assets/css/output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors">
<main class="max-w-2xl mx-auto p-6 md:p-12">
    <div class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-xl border dark:border-slate-800">
        <h1 class="text-3xl font-black mb-2 dark:text-white">{{ .Poll.Title }}</h1>
        <p class="text-slate-500 dark:text-slate-400 mb-8">{{ .Poll.Description }}</p>

        <form action="/vote/{{ .Poll.ID }}" method="POST" class="space-y-4">
            {{ range .Poll.Options }}
            <label class="flex items-center p-5 border dark:border-slate-700 rounded-2xl cursor-pointer hover:bg-indigo-50 dark:hover:bg-slate-800 transition-all group">
                <input type="radio" name="option_id" value="{{ .ID }}" class="w-6 h-6 text-indigo-600" required>
                <span class="ml-4 font-bold text-lg text-slate-700 dark:text-slate-200 group-hover:text-indigo-600 transition-colors">
                    {{ .Value }}
                </span>
            </label>
            {{ end }}

            <button type="submit" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black mt-8 shadow-lg shadow-indigo-500/40 active:scale-95 transition-all">
                Kirim Suara Saya
            </button>
        </form>
    </div>
</main>
<script>lucide.createIcons();</script>
<script src="/assets/js/theme.js"></script>
</body>
</html>
